  conn_max_idle_time: 30m

dislock:
  default_ttl: 30
  max_ttl: 300

log:
  level: debug
  filename: ./logs/assistant.log
  max_size_mb: 16
  max_backups: 7
  max_age_days: 14
  compress: true
  json_format: true
  console: false
