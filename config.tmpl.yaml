# --- App ---
app:
  name: assistant
  port: 9876
  interface: wlan0

# --- Auth ---
auth:
  root:
    username: admin
    password: AAaa00__
    email: admin@example.com
  jwt:
    secret: your-256-bit-secret-key-here
    expiry_hours: 24

# --- Database ---
db:
  driver: mysql
  dsn: assistant:AAaa00__@tcp(127.0.0.1:3306)/assistant?charset=utf8mb4&parseTime=True&loc=Local
  pool:
    max_open_conns: 20
    max_idle_conns: 10
    conn_max_lifetime: 1h
    conn_max_idle_time: 30m

# --- LLM ---
llm:
  provider: minimax
  api_key: "${LLM_API_KEY}"
  base_url: https://api.minimaxi.com
  model: MiniMax-M2.5
  timeout: 60
  max_tokens: 4096
  temperature: 0.2

# --- Channel ---
channel:
  provider: feishu
  feishu:
    app_id: ""
    app_secret: ""

# --- Tars AI ---
tars:
  enabled: true
  llm_temperature: 0.7
  persona:
    humor_level: 50
    honesty_level: 80
  memory:
    max_history: 64
    ttl_minutes: 60
  wiki:
    enabled: true
    dir: ~/share/github/obsidian/

# --- Monitor ---
monitor:
  tracing:
    enabled: true
    sample_rate: 1.0
  metrics:
    enabled: true
    path: /metrics

# --- Log ---
log:
  level: debug
  filename: ./logs/assistant.log
  max_size_mb: 16
  max_backups: 7
  max_age_days: 14
  compress: true
  format: text
  console: true
