        type: integer
      offset:
        type: integer
    type: object
  assistant_internal_app_repo.ListTodoListsParams:
    properties:
      limit:
        type: integer
      offset:
        type: integer
    type: object
  assistant_internal_app_repo.SearchSysUsersByEmailParams:
    properties:
      email:
        type: string
      limit:
        type: integer
      offset:
        type: integer
    type: object
  assistant_internal_app_repo.SearchSysUsersByUserNameParams:
    properties:
      limit:
        type: integer
      offset:
        type: integer
      user_name:
        type: string
    type: object
  assistant_internal_app_repo.SearchTodoListsByContentParams:
    properties:
      content:
        type: string
      limit:
        type: integer
      offset:
        type: integer
    type: object
  assistant_internal_app_repo.SearchTodoListsByDeadlineLTParams:
    properties:
      deadline:
        type: string
      limit:
        type: integer
      offset:
        type: integer
    type: object
  assistant_internal_app_repo.SearchTodoListsByTitleAndContentParams:
    properties:
      content:
        type: string
      limit:
        type: integer
      offset:
        type: integer
      title:
        type: string
    type: object
  assistant_internal_app_repo.SearchTodoListsByTitleParams:
    properties:
      limit:
        type: integer
      offset:
        type: integer
      title:
        type: string
    type: object
  assistant_internal_app_repo.TodoListTaskStatus:
    enum:
    - PENDING
    - IN_PROGRESS
    - COMPLETED
    type: string
    x-enum-varnames:
    - TodoListTaskStatusPENDING
    - TodoListTaskStatusINPROGRESS
    - TodoListTaskStatusCOMPLETED
  assistant_internal_app_repo.UpdateSysUserByIDParams:
    properties:
      email:
        type: string
      id:
        type: integer
      password:
        type: string
      user_name:
        type: string
    type: object
  assistant_internal_app_repo.UpdateTodoListByIDParams:
    properties:
      content:
        type: string
      deadline:
        type: string
      id:
        type: integer
      priority:
        type: integer
      progress:
        type: integer
      task_status:
        $ref: '#/definitions/assistant_internal_app_repo.TodoListTaskStatus'
      title:
        type: string
    type: object
  assistant_pkg_response.Response:
    properties:
      code:
        type: integer
      data:
        description: 仅成功时返回
      message:
        type: string
    type: object
host: 127.0.0.1:1234
info:
  contact: {}
  description: Example Swagger setup for Golang Gin.
  title: Assistant API
  version: "1.0"
paths:
  /sys_user/count:
    get:
      description: 获取系统中所有用户的数量
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/assistant_pkg_response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/assistant_pkg_response.Response'
      summary: 统计用户数量
      tags:
      - 用户管理
  /sys_user/create:
    post:
      consumes:
      - application/json
      description: 创建一个新的用户
      parameters:
      - description: 用户创建参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/assistant_internal_app_repo.CreateSysUserParams'
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/assistant_pkg_response.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/assistant_pkg_response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/assistant_pkg_response.Response'
      summary: 创建用户
      tags:
      - 用户管理
  /sys_user/delete/{id}:
    delete:
      description: 根据用户ID删除用户
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/assistant_pkg_response.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/assistant_pkg_response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/assistant_pkg_response.Response'
      summary: 删除用户
      tags:
      - 用户管理
  /sys_user/get/{id}:
    get:
      description: 根据用户ID获取用户信息
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
