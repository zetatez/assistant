        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/assistant_pkg_response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/assistant_pkg_response.Response'
      summary: 通过用户名搜索用户
      tags:
      - 用户管理
  /sys_user/update/{id}:
    put:
      consumes:
      - application/json
      description: 根据用户ID更新用户信息
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      - description: 用户更新参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/assistant_internal_app_repo.UpdateSysUserByIDParams'
      produces:
