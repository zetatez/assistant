  /todo_list/progress/{id}:
    patch:
      consumes:
      - application/json
      description: 根据 ID 更新 Todo 进度，进度100时自动设为COMPLETED
      parameters:
      - description: 待办事项ID
        in: path
        name: id
        required: true
        type: integer
      - description: 进度 0-100
        in: query
        name: progress
        required: true
