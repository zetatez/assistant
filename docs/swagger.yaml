      - application/json
      description: 根据 ID 更新 Todo 优先级 (1-10, 越高越紧急)
      parameters:
      - description: 待办事项ID
        in: path
        name: id
        required: true
        type: integer
      - description: 优先级 1-10
        in: query
        name: priority
        required: true
        type: integer
      produces:
      - application/json
      responses:
