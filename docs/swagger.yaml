      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/assistant_pkg_response.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/assistant_pkg_response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/assistant_pkg_response.Response'
