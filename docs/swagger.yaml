          schema:
            $ref: '#/definitions/assistant_pkg_response.Response'
      summary: 获取用户详情
      tags:
      - 用户管理
  /sys_user/list:
    get:
      consumes:
      - application/json
      description: 支持分页、排序的用户列表查询
      parameters:
      - description: 用户列表参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/assistant_internal_app_repo.ListSysUsersParams'
