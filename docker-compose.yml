services:
  mysql:
    image: mysql:8.0
    container_name: assistant-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: assistant
      MYSQL_ROOT_PASSWORD: AAaa00__
      MYSQL_USER: assistant
      MYSQL_PASSWORD: AAaa00__
      TZ: Asia/Shanghai
    command: --skip-ssl
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

